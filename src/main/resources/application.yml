spring:
  application:
    name: jc-ai-agent-backend
  ai:
    openai:
      # 禁用 OpenAI 自动配置，ChatModelRegistry 按需手动创建 OpenAI 兼容客户端
      api-key: "disabled"
      chat:
        enabled: false
      embedding:
        enabled: false
    dashscope:
      api-key: ${JC_AI_AGENT_API_KEY}
      chat:
        options:
          model: qwen3-max-2026-01-23
      embedding:
        options:
#          默认 维度为 1536
          model: text-embedding-v2
    mcp:
      client:
        request-timeout: 60s
        streamable-http:
          connections: {}


  datasource:
    url: ${JC_AI_AGENT_POSTGRES_URL:jdbc:postgresql://localhost:5432/love_app}
    username: ${JC_AI_AGENT_POSTGRES_USER_NAME:postgres}
    password: ${JC_AI_AGENT_POSTGRES_PWD:}
  data:
    redis:
      host: ${JC_REDIS_HOST:localhost}
      port: ${JC_REDIS_PORT:6379}
      password: ${JC_REDIS_PASSWORD:}
      database: ${JC_REDIS_DATABASE:0}
      repositories:
        enabled: false
  jpa:
    hibernate:
#      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  elasticsearch:
    uris: ${JC_ES_URIS:http://localhost:9200}
    username: ${JC_ES_USERNAME:elastic}
    password: ${JC_ES_PASSWORD:}
jc-ai-agent:
  api_key: ${JC_AI_AGENT_API_KEY}
  email_account: ${JC_AI_AGENT_EMAIL_USERNAME}
  email_password: ${JC_AI_AGENT_EMAIL_PASSWORD}
  tenant:
    max-create-teams: 5
  rag:
    hybrid-search:
      enabled: ${JC_HYBRID_SEARCH_ENABLED:true}
      keyword-index: ${JC_HYBRID_SEARCH_INDEX:study_friends_bm25}
      rrf-k: ${JC_HYBRID_SEARCH_RRF_K:60}
      sync-on-startup: ${JC_HYBRID_SEARCH_SYNC_ON_STARTUP:false}
  web-search:
    enabled: ${JC_WEB_SEARCH_ENABLED:false}
    max-results: ${JC_WEB_SEARCH_MAX_RESULTS:5}
    scrape-main-content: ${JC_WEB_SEARCH_SCRAPE_MAIN_CONTENT:true}
    max-content-chars: ${JC_WEB_SEARCH_MAX_CONTENT_CHARS:1200}
    request-timeout: ${JC_WEB_SEARCH_REQUEST_TIMEOUT:30s}
    connect-timeout: ${JC_WEB_SEARCH_CONNECT_TIMEOUT:10s}
    firecrawl-api-key: ${FIRECRAWL_API_KEY:}
    firecrawl-mcp-url: ${FIRECRAWL_MCP_URL:}
  voice:
    websocket-path: ${JC_VOICE_WEBSOCKET_PATH:/ws/voice}
    session-idle-timeout: ${JC_VOICE_SESSION_IDLE_TIMEOUT:30m}
    reconnect-grace-period: ${JC_VOICE_RECONNECT_GRACE_PERIOD:45s}
    stale-eviction-interval: ${JC_VOICE_STALE_EVICTION_INTERVAL:60s}
    text-stream-timeout: ${JC_VOICE_TEXT_STREAM_TIMEOUT:3m}
    tts-audio-mime-type: ${JC_VOICE_TTS_AUDIO_MIME_TYPE:audio/mpeg}
    codec: ${JC_VOICE_CODEC:audio/mpeg}
    asr:
      provider: ${JC_VOICE_ASR_PROVIDER:aliyun}
      api-key: ${JC_VOICE_ASR_API_KEY:}
      model: ${JC_VOICE_ASR_MODEL:paraformer-realtime-v1}
      app-key: ${JC_VOICE_ASR_APP_KEY:}
      access-key-id: ${JC_VOICE_ASR_ACCESS_KEY_ID:}
      access-key-secret: ${JC_VOICE_ASR_ACCESS_KEY_SECRET:}
      sample-rate: ${JC_VOICE_ASR_SAMPLE_RATE:16000}
      format: ${JC_VOICE_ASR_FORMAT:pcm}
    tts:
      provider: ${JC_VOICE_TTS_PROVIDER:aliyun}
      base-url: ${JC_VOICE_TTS_BASE_URL:}
      api-key: ${JC_VOICE_TTS_API_KEY:}
      voice: ${JC_VOICE_TTS_VOICE:longxiaochun}
      model: ${JC_VOICE_TTS_MODEL:cosyvoice-v1}
      output-format: ${JC_VOICE_TTS_OUTPUT_FORMAT:mp3}
server:
  port: 8525
  servlet:
    context-path: /api

# 对象存储（用于头像等静态资源）
# - 数据库建议仅存 Key（如 avatar/1024/2026/01/xxx.jpg）
# - 前端直传：后端仅生成上传凭证 + 记录 key
storage:
  # 可选：oss / none（后续可扩展为 s3 / minio 等）
  type: oss
  # 访问域名（可为 OSS 域名或 CDN 域名），用于把 Key 拼成可访问 URL
  domain: ${JC_STORAGE_DOMAIN:}
  oss:
    endpoint: ${JC_OSS_ENDPOINT:}
    bucket: ${JC_OSS_BUCKET:}
    access-key-id: ${JC_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${JC_OSS_ACCESS_KEY_SECRET:}
    # 前端直传上传策略有效期（秒）
    expire-seconds: 300
    # 头像最大大小（MB）
    max-size-mb: 2
    # Bucket 若为私有读，开启后端返回“读取签名 URL”，避免前端直接访问报错：You have no right to access this object because of bucket acl
    sign-read-url: ${JC_OSS_SIGN_READ_URL:false}
    # 读取签名 URL 有效期（秒）
    read-url-expire-seconds: ${JC_OSS_READ_URL_EXPIRE_SECONDS:3600}
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: fun.javierchen.jcaiagentbackend.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: false
  setting:
    language: zh_cn
